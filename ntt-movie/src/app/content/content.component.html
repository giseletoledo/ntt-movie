<div class="container mt-5">
  <div class="mb-3 col-lg-12 col-md-12">
    <form class="d-flex" #searchForm="ngForm" (ngSubmit)="fetchMovie()">
      <input
        class="form-control me-2"
        type="search"
        placeholder="Procurar filmes"
        aria-label="Search"
        [(ngModel)]="movieTitle"
        name="movieTitle"
        (keyup.enter)="fetchMovie()">
      <button class="btn btn-danger" type="submit">Search</button>
    </form>

    <button class="btn btn-primary mt-3 d-block" (click)="toggleFavoritesFilter()">
      <i class="bi" [ngClass]="{'bi-heart-fill': isFilterActive, 'bi-heart': !isFilterActive}"></i>
      {{ isFilterActive ? 'Remover Filtro de Favoritos' : 'Filtrar por Favoritos' }}
    </button>

    <div *ngIf="isLoading" class="mt-3 text-center">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-warning mt-3">
      {{ errorMessage }}
    </div>
  </div>

  <div class="row">
    <div class="col-lg-3 col-md-6 col-sm-12" *ngFor="let movie of displayMovies">
      <app-card
        [movie]="movie"
        [imageUrl]="movie.Poster"
        [title]="movie.Title"
        [year]="movie.Year">
      </app-card>
    </div>
  </div>
</div>
